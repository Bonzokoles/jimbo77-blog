name: Daily Blog Publisher (MOA)

on:
    schedule:
        # 9:00 CEST (lato) / 8:00 CET (zima) — GitHub Actions use UTC
        - cron: "0 7 * * *"
    workflow_dispatch:
        inputs:
            category:
                description: "Force category (optional)"
                required: false
                type: choice
                options:
                    - ""
                    - "AI News"
                    - "AI Odkrycia"
                    - "AI Nowości"
                    - "AI Zastosowania"
                    - "AI Moje Projekty"

permissions:
    contents: write

jobs:
    publish:
        runs-on: ubuntu-latest
        timeout-minutes: 15

        steps:
            - name: Checkout repo
              uses: actions/checkout@v4
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"
                  cache: "pip"
                  cache-dependency-path: publisher/requirements.txt

            - name: Install dependencies
              run: pip install -r publisher/requirements.txt

            - name: Generate & publish article
              env:
                  OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
                  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
                  REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
              run: |
                  cd publisher
                  CATEGORY="${{ github.event.inputs.category }}"
                  if [ -n "$CATEGORY" ]; then
                    python publisher_workflow.py --daily --category "$CATEGORY"
                  else
                    python publisher_workflow.py --daily
                  fi

            - name: Commit & push new article
              run: |
                  git config user.name "Jimbo Publisher Bot"
                  git config user.email "bot@jimbo77.org"
                  git add public/blog-content/ public/blog-images/ src/data/blogPosts.js
                  # Check if there are changes to commit
                  if git diff --cached --quiet; then
                    echo "No new content to commit"
                    exit 0
                  fi
                  SLUG=$(git diff --cached --name-only | grep blog-content | head -1 | sed 's|.*/||;s|\.md||')
                  git commit -m "content: ${SLUG:-daily-article} (Jimbo Publisher MOA)"
                  git push
