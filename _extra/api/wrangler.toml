name = "jimbo77-social-club-api"
main = "api/index.ts"
compatibility_date = "2024-01-01"

# D1 Database - stock po środku
[[d1_databases]]
binding = "DB"
database_name = "jimbo77-social-db"
database_id = "your-database-id-here"

# Environment variables
[vars]
ENVIRONMENT = "production"

# Routes
[[routes]]
pattern = "api.jimbo77.org/*"
custom_domain = true
